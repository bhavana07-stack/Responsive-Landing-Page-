<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoRide Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">EcoRide</div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Features</a>
            <a href="#">Reviews</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">

        <div class="hero-text">
            <h1>Ride Smarter, Travel Greener</h1>

            <p>
                EcoRide provides eco-friendly electric bike rentals
                for a cleaner and smarter future.
            </p>

            <button>Get Started</button>
        </div>

        <div class="hero-image-container">

            <img
                id="bikeImage"
                src="ride-engwe-p20.jpg"
                alt="Electric Bike"
            >

            <div class="info-buttons">
                <button onclick="showInfo('speed')">
                    ⚡ Speed
                </button>

                <button onclick="showInfo('battery')">
                    🔋 Battery
                </button>

                <button onclick="showInfo('eco')">
                    🌱 Eco Mode
                </button>

                <button onclick="showInfo('reset')">
                    🔄 Reset
                </button>
            </div>

            <p id="infoText" class="info-text">
                Click a button to learn more about the bike.
            </p>

        </div>

    </section>

    <script>
        function showInfo(type) {

            const info = document.getElementById("infoText");
            const bike = document.getElementById("bikeImage");

            bike.style.animation = "none";
            bike.offsetHeight;
            bike.style.animation = "pulseBike 0.8s ease";

            if (type === "speed") {
                info.innerHTML =
                    "⚡ Top Speed: Up to 45 km/h";
            }

            else if (type === "battery") {
                info.innerHTML =
                    "🔋 Battery Range: Up to 100 km on a single charge";
            }

            else if (type === "eco") {
                info.innerHTML =
                    "🌱 Eco-Friendly: Zero emissions and sustainable transportation";
            }

            else if (type === "reset") {
                info.innerHTML =
                    "Click a button to learn more about the bike.";
            }
        }
    </script>

</body>
</html>
